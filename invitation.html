<!doctype html>
<html lang="nl">
  <head>
    <meta charset="utf-8">

    <title>Uitnodiging — Louen wordt 7</title>
    <style>
      body{font-family:Georgia,serif;color:#2b1b3a;margin:0;padding:2rem;display:flex;align-items:center;justify-content:center}
      .sheet{width:800px;height:1120px;border:1px solid rgba(0,0,0,0.06);padding:3rem;background:linear-gradient(180deg,#fff,#fffefc);box-shadow:0 10px 30px rgba(0,0,0,0.08)}
      .title{font-size:48px;color:#8a2be2;margin:0}
      .sub{font-size:20px;color:#ff6fa9;margin-top:.5rem}
      .meta{margin-top:2rem;font-size:18px}
      .print{margin-top:2rem}
      .no-print{margin-top:1.5rem}
      @media print{ .no-print{display:none} }

  </head>
  <body>
    <div class="sheet">
      <h1 class="title">Hoera! Louen wordt 7</h1>

        <p><strong>Wanneer:</strong> 27 november, 15:00</p>
        <p><strong>Waar:</strong> <a href="https://www.google.com/maps/search/?api=1&query=Strandcaf%C3%A9+Buiten+Amsterdam" target="_blank" rel="noopener">Strandcafé Buiten, Amsterdam</a></p>
        <p><strong>RSVP:</strong> Els — email: <a href="mailto:els@a-lab.nl">els@a-lab.nl</a> (of gebruik het formulier op de website)</p>
      </div>

      <div class="print">
        <p>Neem dit mee als papieren uitnodiging. Er is taart, spelletjes en veel confetti!</p>
      </div>

      <div class="no-print">
        <button onclick="window.print()">Print uitnodiging</button>
      </div>
    </div>
  </body>
</html>
